aid: barnes-and-noble-education
name: Barnes & Noble Education
description: >-
  Barnes & Noble Education, Inc. (NYSE: BNED) is one of the largest operators
  of college bookstores in the United States, operating physical and virtual
  campus stores alongside digital course-materials and educational services.
  BNED reaches more than 5.7 million students through 1,125+ physical and
  virtual stores across higher education and K-12 institutions, primarily
  through its Barnes & Noble College Booksellers subsidiary and the MBS
  Textbook Exchange wholesale business. Flagship offerings include the
  First Day and First Day Complete affordable-access course-materials
  programs, BNC OER+ digital courseware, faculty adoption tools, campus
  retail and ecommerce services, and BNC AI Tools. BNED separated from
  Barnes & Noble, Inc. in August 2015 and is not affiliated with the
  Barnes & Noble retail bookstore chain. This repository captures any
  APIs, developer tools, and machine-readable artifacts associated with
  BNED. No public developer APIs or developer portal have been identified
  at this time; integrations with campus systems and learning-management
  systems are delivered through institutional partnerships rather than a
  public API surface.
