x-integrations:
  - context: >-
      BNED publishes no public API, OpenAPI specification, or developer
      portal. Course-materials access and inclusive-access fulfillment
      typically integrate with campus systems (SIS, bursar, LMS) at the
      institutional level. No Canvas, Blackboard, D2L Brightspace,
      Moodle, or LTI integration documentation is published on
      bnedu.com or bncollege.com at this time.
x-notable-absences:
  - No public developer portal
  - No OpenAPI / Swagger specification
  - No SDKs, CLIs, or sample code
  - No public GitHub organization with active code (legacy bnedu org dormant since 2015)
  - No public pricing or rate limits (B2B / institutional contracts only)
  - No public store-directory data feed / API
  - No published LMS integration specification
